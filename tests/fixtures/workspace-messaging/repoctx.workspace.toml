schema_version = "1.0.0"
name = "messaging-workspace"

[[repos]]
name = "orders-publisher"
path = "orders-publisher"

[[repos]]
name = "orders-consumer"
path = "orders-consumer"

[[repos]]
name = "profile-client"
path = "profile-client"

[[repos]]
name = "profile-server"
path = "profile-server"

[[contracts.queue]]
