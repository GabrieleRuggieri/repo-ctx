name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REPOCTX_HASH_EMBED: "1"

jobs:
  tier1:
    name: Tier-1 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Latency budget guards
        run: cargo test -p repoctx-core --test bench_budget

      - name: Validate JSON Schema contract
        run: cargo test -p repoctx-schema --test schema_validation

      - name: Build release
        run: cargo build --release --bin repoctx

  windows-tier2:
    name: Tier-2 (windows-latest)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release --bin repoctx
